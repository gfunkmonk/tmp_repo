name: Build all musl static binaries

on:
  # Build at 00:00 every 6th day
  schedule:
    - cron: "0 0 */6 * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tools:
        description: "Tools to build — comma-separated or 'all' (aria2c,axel,bsdtar,curl,dash,oksh,tar,vim,wget,xz)"
        required: false
        default: "all"
      archs:
        description: "Architectures to build — comma-separated or 'all' (x86_64,x86,aarch64,armv7)"
        required: false
        default: "all"

env:
  ALPINE_VERSION: "3.23.3"

permissions:
  contents: read

jobs:
  # Resolve which tools and archs to build, outputting JSON arrays for the matrix.
  # Scheduled runs and 'all' inputs always produce the full lists.
  setup:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.matrix.outputs.tools }}
      archs: ${{ steps.matrix.outputs.archs }}
    steps:
    - name: Resolve matrix
      id: matrix
      run: |
        ALL_TOOLS='["aria2c","axel","bsdtar","curl","dash","oksh","tar","vim","wget","xz"]'
        ALL_ARCHS='["x86_64","x86","aarch64","armv7"]'

        TOOLS_INPUT="${{ github.event.inputs.tools }}"
        ARCHS_INPUT="${{ github.event.inputs.archs }}"

        if [ -z "${TOOLS_INPUT}" ] || [ "${TOOLS_INPUT}" = "all" ]; then
          echo "tools=${ALL_TOOLS}" >> "$GITHUB_OUTPUT"
        else
          JSON=$(echo "${TOOLS_INPUT}" | tr -d ' ' | tr ',' '\n' | jq -R . | jq -sc .)
          echo "tools=${JSON}" >> "$GITHUB_OUTPUT"
        fi

        if [ -z "${ARCHS_INPUT}" ] || [ "${ARCHS_INPUT}" = "all" ]; then
          echo "archs=${ALL_ARCHS}" >> "$GITHUB_OUTPUT"
        else
          JSON=$(echo "${ARCHS_INPUT}" | tr -d ' ' | tr ',' '\n' | jq -R . | jq -sc .)
          echo "archs=${JSON}" >> "$GITHUB_OUTPUT"
        fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.tools) }}
        arch: ${{ fromJson(needs.setup.outputs.archs) }}

    steps:
    - uses: actions/checkout@v4

    - name: Cache Alpine rootfs
      uses: actions/cache@v4
      with:
        path: alpine-minirootfs-${{ env.ALPINE_VERSION }}-${{ matrix.arch }}.tar.gz
        key: alpine-rootfs-${{ env.ALPINE_VERSION }}-${{ matrix.arch }}

    - name: Build ${{ matrix.tool }} for ${{ matrix.arch }}
      run: |
        chmod +x ${{ matrix.tool }}-static-musl.sh
        ./${{ matrix.tool }}-static-musl.sh
      env:
        ARCH: ${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.tool }}-${{ matrix.arch }}
        path: dist/${{ matrix.tool }}-${{ matrix.arch }}.tar.xz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist/
        merge-multiple: true

    - name: Delete Previous Release
      run: |
        gh release delete "continuous-universal" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y || echo "No release to delete"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Continuous universal"
        tag_name: continuous-universal
        prerelease: false
        draft: false
        generate_release_notes: false
        make_latest: true
        files: |
          dist/*.tar.xz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
