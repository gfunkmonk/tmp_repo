name: Build all musl static binaries

on:
  # Build at 00:00 every 6th day
  schedule:
    - cron: "0 0 */6 * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool to build and release (choose 'all' to build every tool)"
        required: true
        default: all
        type: choice
        options:
          - all
          - aria2c
          - axel
          - bash
          - bsdtar
          - curl
          - dash
          - lftp
          - nano
          - oksh
          - tar
          - vim
          - wget
          - xz

env:
  ALPINE_VERSION: "3.23.3"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine tool matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.tool }}" == "all" || "${{ inputs.tool }}" == "" ]]; then
            echo 'matrix=["aria2c","axel","bsdtar","curl","dash","lftp","nano","oksh","tar","vim","wget","xz"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["${{ inputs.tool }}"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/pasta/ccache
      CCACHE_CHROOT_DIR: /ccache
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}
        arch: [x86_64, x86, aarch64, armv7]

    steps:
    - uses: actions/checkout@v4

    - name: Determine tool version
      id: tool-version
      run: |
        set -euo pipefail
        if [ "${{ matrix.tool }}" = "aria2c" ]; then
          version=$(curl -fsSL --connect-timeout 10 --max-time 30 \
            "https://api.github.com/repos/aria2/aria2/releases/latest" \
            | grep '"tag_name"' | sed 's/.*"release-\([^"]*\)".*/\1/') || true
          if [ -z "${version}" ]; then
            version="1.37.0"
          fi
        else
          version=$(sed -n 's/^[A-Z_]*VERSION="\([^"]*\)".*/\1/p' "${{ matrix.tool }}-static-musl.sh" | head -n1)
        fi
        if [ -z "${version}" ]; then
          echo "Unable to determine version for ${{ matrix.tool }}" >&2
          exit 1
        fi
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "PACKAGE_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Prepare ccache directory
      run: |
            mkdir -p "${CCACHE_DIR}"
            cat >> $GITHUB_ENV << 'EOF'
            CCACHE_NOHASHDIR=true
            CCACHE_NOHARDLINK=true
            CCACHE_NLEVELS=4
            CCACHE_COMPILERCHECK=content
            CCACHE_COMPRESS=1
            CCACHE_COMPRESSLEVEL=7
            CCACHE_INODECACHE=true
            CCACHE_SLOPINESS=file_macro,locale,time_macros
            CCACHE_NOFILECLONE=true
            CCACHE_DIRECT=true
            CCACHE_DEPEND=true
            EOF
            echo "CCACHE Environment set!"
            
    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        create-symlink: true
        key: ccache-${{ env.ALPINE_VERSION }}-${{ matrix.arch }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool)) }}
        restore-keys: |
          ccache-${{ env.ALPINE_VERSION }}-${{ matrix.arch }}-${{ matrix.tool }}-
        append-timestamp: false
        max-size: 3G

    - name: Cache tarballs
      uses: actions/cache@v4
      with:
        path: |
          *.tar.gz
          *.tar.xz
        key: build-${{ env.ALPINE_VERSION }}-${{ matrix.arch }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool)) }}
        restore-keys: |
          build-${{ env.ALPINE_VERSION }}-${{ matrix.arch }}-${{ matrix.tool }}-

    - name: Build ${{ matrix.tool }} for ${{ matrix.arch }}
      run: |
        chmod +x ${{ matrix.tool }}-static-musl.sh
        ./${{ matrix.tool }}-static-musl.sh
      env:
        ARCH: ${{ matrix.arch }}

    - name: Gather artifact info
      id: artifact-info
      run: |
        set -euo pipefail
        shopt -s nullglob
        files=(dist/${{ matrix.tool }}-*-${{ matrix.arch }}.tar.xz)
        if [ "${#files[@]}" -ne 1 ]; then
          echo "Expected exactly one artifact, found ${#files[@]}" >&2
          ls -al dist || true
          exit 1
        fi
        file="${files[0]}"
        name="$(basename "${file}")"
        base="${name%.tar.xz}"
        version="${base#${{ matrix.tool }}-}"
        version="${version%-${{ matrix.arch }}}"
        echo "file=${file}" >> "$GITHUB_OUTPUT"
        echo "name=${name}" >> "$GITHUB_OUTPUT"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "TOOL_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact-info.outputs.name }}
        path: ${{ steps.artifact-info.outputs.file }}

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - name: Download artifacts for ${{ matrix.tool }}
      uses: actions/download-artifact@v4
      with:
        path: dist/
        pattern: ${{ matrix.tool }}-*
        merge-multiple: true

    - name: Determine version
      id: release-version
      run: |
        set -euo pipefail
        shopt -s nullglob
        files=(dist/${{ matrix.tool }}-*-*.tar.xz)
        if [ "${#files[@]}" -eq 0 ]; then
          echo "No artifacts found for ${{ matrix.tool }}" >&2
          ls -al dist || true
          exit 1
        fi
        name="$(basename "${files[0]}")"
        base="${name%.tar.xz}"
        arch="${base##*-}"
        version="${base#${{ matrix.tool }}-}"
        version="${version%-${arch}}"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "TOOL_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Delete Previous Release
      run: |
        gh release delete "${{ matrix.tool }}-${{ steps.release-version.outputs.version }}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y || echo "No release to delete"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "${{ matrix.tool }} ${{ steps.release-version.outputs.version }}"
        tag_name: ${{ matrix.tool }}-${{ steps.release-version.outputs.version }}
        prerelease: false
        draft: false
        generate_release_notes: false
        make_latest: false
        files: |
          dist/*.tar.xz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
