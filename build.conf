# build.conf - Centralized build configuration for static-musl build scripts.
# Source this file or let common.sh provide defaults; values here override those defaults.

# Alpine Linux version used for the build chroot.
ALPINE_VERSION="3.23.3"

# Network timeout values (seconds)
CONNECT_TIMEOUT=10
MAX_TIME_SHORT=30
MAX_TIME_LONG=120

# Default compiler flags used across most build scripts.
# Individual scripts may override these for their specific needs.
DEFAULT_CFLAGS="-Os -static -ffunction-sections -fdata-sections -fomit-frame-pointer -fno-stack-protector -no-pie"
DEFAULT_LDFLAGS="-static -Wl,--gc-sections"
DEFAULT_PKG_CONFIG="pkg-config --static"

# CCACHE: path inside the chroot where the host CCACHE_DIR is bind-mounted.
CCACHE_CHROOT_DIR="${CCACHE_CHROOT_DIR:-/ccache}"

# Default chroot directory name (relative to build script location).
# NOTE: This value is authoritative in common.sh; this entry is for documentation only.
CHROOTDIR="${CHROOTDIR:-.chrootbuild}"
